name: Steam Check
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run script
        env:
          STEAM_URL: ${{ secrets.STEAM_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python check.py
